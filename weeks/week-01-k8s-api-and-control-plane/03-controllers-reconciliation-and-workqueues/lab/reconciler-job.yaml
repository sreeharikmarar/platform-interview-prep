apiVersion: batch/v1
kind: Job
metadata:
  name: cm-reconciler
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: runner
        image: bitnami/kubectl:1.30
        command: ["/bin/sh","-c"]
        args:
        - |
          set -e
          MSG=$(kubectl get cm parent -o jsonpath='{.data.message}')
          kubectl create cm child --from-literal=message="$MSG" --dry-run=client -o yaml | kubectl apply -f -
          echo "reconciled child.message=$MSG"
