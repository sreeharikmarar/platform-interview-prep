apiVersion: apps/v1
kind: Deployment
metadata:
  name: drift-demo
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: drift-demo
  template:
    metadata:
      labels:
        app: drift-demo
    spec:
      containers:
      - name: nginx
        image: nginx:1.25
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
