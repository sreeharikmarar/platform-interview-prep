# Envoy v3 static config for inference gateway weighted routing lab
# Two backend clusters with weighted traffic split and circuit breakers
#
# Usage:
#   docker run --rm -v $(pwd)/envoy-weighted.yaml:/etc/envoy/envoy.yaml \
#     --network host envoyproxy/envoy:v1.28-latest

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
    - name: inference_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 10000
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: inference_gateway
                codec_type: AUTO
                # Longer timeouts for inference workloads
                stream_idle_timeout: 300s
                request_timeout: 300s
                route_config:
                  name: model_routes
                  virtual_hosts:
                    - name: inference
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            weighted_clusters:
                              clusters:
                                - name: model_v1
                                  weight: 90
                                - name: model_v2
                                  weight: 10
                            timeout: 120s
                            retry_policy:
                              retry_on: "5xx,reset,connect-failure"
                              num_retries: 1
                              retry_budget:
                                budget_percent:
                                  value: 20.0
                                min_retry_concurrency: 1
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: model_v1
      connect_timeout: 5s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      # To switch to least-request LB, comment ROUND_ROBIN above and uncomment:
      # lb_policy: LEAST_REQUEST
      # least_request_lb_config:
      #   choice_count: 3
      #   active_request_bias:
      #     default_value: 1.0
      #     runtime_key: model_v1.active_request_bias
      load_assignment:
        cluster_name: model_v1
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: 127.0.0.1
                      port_value: 8081
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 100
            max_pending_requests: 50
            max_requests: 100
            max_retries: 3

    - name: model_v2
      connect_timeout: 5s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: model_v2
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: 127.0.0.1
                      port_value: 8082
      # Tight circuit breaker to demonstrate overflow protection on slower model
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 10
            max_pending_requests: 5
            max_requests: 10
            max_retries: 1
