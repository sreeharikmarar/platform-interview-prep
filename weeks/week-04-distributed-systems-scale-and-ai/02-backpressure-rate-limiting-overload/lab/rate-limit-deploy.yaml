---
# Deployment: slow-backend
#
# A lightweight HTTP server that accepts a DELAY_MS environment variable to
# simulate a slow or degraded backend service. Used in circuit breaker and
# overload protection labs.
#
# The server listens on port 8080 and responds to any request with HTTP 200
# after sleeping DELAY_MS milliseconds. Setting DELAY_MS to a value larger
# than the Envoy route timeout (5s = 5000ms) will cause upstream timeouts,
# triggering Envoy response flag UT (upstream request timeout).
#
# Target Kubernetes: 1.28+
# Image: python:3.12-slim (standard library only, no extra dependencies)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: slow-backend
  namespace: default
  labels:
    app: slow-backend
    app.kubernetes.io/name: slow-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: overload-lab
spec:
  replicas: 3
  selector:
    matchLabels:
      app: slow-backend
  template:
    metadata:
      labels:
        app: slow-backend
        app.kubernetes.io/name: slow-backend
        app.kubernetes.io/component: backend
    spec:
      # Ensure pods spread across nodes for realistic failure simulation.
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: slow-backend

      containers:
      - name: server
        # python:3.12-slim is roughly 50 MB compressed — small enough for a lab
        # and uses only the standard library so there are no dependency surprises.
        image: python:3.12-slim
        imagePullPolicy: IfNotPresent

        # Inline the HTTP server as a command argument to avoid needing a
        # ConfigMap or custom image build. The server reads DELAY_MS from the
        # environment and sleeps before responding, simulating latency.
        command:
        - python3
        - -c
        - |
          import os, time, http.server, socketserver

          DELAY_MS = int(os.environ.get("DELAY_MS", "0"))
          PORT = int(os.environ.get("PORT", "8080"))

          class Handler(http.server.BaseHTTPRequestHandler):
              def do_GET(self):
                  if DELAY_MS > 0:
                      time.sleep(DELAY_MS / 1000.0)
                  body = f"ok delay={DELAY_MS}ms\n".encode()
                  self.send_response(200)
                  self.send_header("Content-Type", "text/plain")
                  self.send_header("Content-Length", str(len(body)))
                  self.end_headers()
                  self.wfile.write(body)

              def do_POST(self):
                  self.do_GET()

              def log_message(self, fmt, *args):
                  # Emit structured-ish access log to stdout.
                  print(f"[{self.address_string()}] {fmt % args}", flush=True)

          print(f"Starting server on port {PORT} with delay {DELAY_MS}ms", flush=True)
          with socketserver.TCPServer(("", PORT), Handler) as httpd:
              httpd.allow_reuse_address = True
              httpd.serve_forever()

        ports:
        - name: http
          containerPort: 8080
          protocol: TCP

        env:
        # Adjust DELAY_MS to simulate different backend conditions:
        #   0      — healthy, near-instant responses
        #   200    — moderate latency, within normal Envoy route timeout
        #   2000   — high latency, approaching timeout boundary
        #   6000   — exceeds Envoy route timeout (5s), triggers UT response flag
        - name: DELAY_MS
          value: "0"

        # Resource limits prevent runaway pods from impacting other workloads
        # on shared lab clusters. Adjust as needed for your node sizes.
        resources:
          requests:
            cpu: "50m"
            memory: "32Mi"
          limits:
            cpu: "200m"
            memory: "64Mi"

        # Liveness probe: restart the container if the server stops responding.
        # Failures here will trigger the pod to restart after failureThreshold
        # consecutive failures, which you can use to observe UH (no healthy
        # upstream) and outlier detection in the Envoy lab.
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 3
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3

        # Readiness probe: remove the pod from Service endpoints when it is not
        # ready. Envoy's EDS integration (via kube-proxy or an Envoy control
        # plane) will remove unready endpoints from the cluster load balancer,
        # preventing traffic from reaching a pod that has not finished starting.
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 2
          periodSeconds: 5
          timeoutSeconds: 1
          failureThreshold: 2

        # Restrict filesystem access. The python server only needs to write to
        # stdout (captured by Docker/containerd logging). No privileged access
        # is needed.
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65534   # nobody
          capabilities:
            drop:
            - ALL

      # Pod-level security context.
      securityContext:
        seccompProfile:
          type: RuntimeDefault

      # Graceful shutdown: give in-flight requests time to complete before the
      # pod is terminated. Align this with your longest expected request duration
      # plus any connection draining period.
      terminationGracePeriodSeconds: 15

---
# Service: slow-backend
#
# ClusterIP Service that selects the slow-backend pods.
# Kubernetes kube-proxy writes iptables rules to load-balance traffic across
# pod IPs. If you are running Envoy as a sidecar or gateway, this Service
# provides the stable DNS name (slow-backend.default.svc.cluster.local:8080)
# that the upstream cluster in Envoy's config references.

apiVersion: v1
kind: Service
metadata:
  name: slow-backend
  namespace: default
  labels:
    app: slow-backend
    app.kubernetes.io/name: slow-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: overload-lab
spec:
  type: ClusterIP
  selector:
    app: slow-backend
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
