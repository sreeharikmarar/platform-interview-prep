# Envoy v3 static bootstrap configuration for circuit breaker lab.
#
# This config demonstrates:
#   - Circuit breaker thresholds (max_connections, max_pending_requests, max_requests, max_retries)
#   - Retry policy with retry_budget to bound fleet-wide retry amplification
#   - Outlier detection to eject individual unhealthy hosts
#   - Admin interface for live stats inspection
#
# Target: envoyproxy/envoy:v1.30-latest
# Admin API: http://localhost:9901
# Proxy:     http://localhost:10000  (forwards to backend at host.docker.internal:8080)

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901
  # Do not expose the admin interface externally in production.
  # It provides unauthenticated access to drain listeners, reset counters,
  # and read secrets from SDS. Bind to 127.0.0.1 in real deployments.

static_resources:

  listeners:
  - name: listener_0
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 10000
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: ingress_http
          # Access log goes to stdout so Docker captures it.
          # The %RESPONSE_FLAGS% field is critical: UO = upstream overflow (circuit
          # breaker tripped), UH = no healthy upstream, UF = upstream connection failure.
          access_log:
          - name: envoy.access_loggers.stdout
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
              log_format:
                text_format_source:
                  inline_string: "[%START_TIME%] \"%REQ(:METHOD)% %REQ(X-ENVOY-ORIGINAL-PATH?:PATH)% %PROTOCOL%\" %RESPONSE_CODE% %RESPONSE_FLAGS% %BYTES_RECEIVED% %BYTES_SENT% %DURATION% %RESP(X-ENVOY-UPSTREAM-SERVICE-TIME)% \"%REQ(X-FORWARDED-FOR)%\" \"%REQ(USER-AGENT)%\" \"%REQ(X-REQUEST-ID)%\" \"%REQ(:AUTHORITY)%\" \"%UPSTREAM_HOST%\"\n"
          route_config:
            name: local_route
            virtual_hosts:
            - name: backend
              domains: ["*"]
              routes:
              - match:
                  prefix: "/"
                route:
                  cluster: backend
                  # Per-route timeout. Must be less than the circuit breaker's
                  # effective request window. Tune this to match your backend's
                  # p99 latency target — not your p50.
                  timeout: 5s
                  retry_policy:
                    # Retry on connection failures and 5xx responses from upstream.
                    retry_on: "connect-failure,refused-stream,unavailable,cancelled,retriable-status-codes"
                    retriable_status_codes:
                    - 503
                    num_retries: 2
                    # Per-try timeout must be less than the route timeout so that
                    # retries can actually fire within the overall budget.
                    per_try_timeout: 1.5s
                    # retry_budget bounds fleet-wide retry amplification.
                    # budget_percent: 20.0 means retries across the cluster cannot
                    # exceed 20% of total in-flight requests. When the budget is
                    # exhausted Envoy stops issuing retries and returns the error
                    # immediately — preventing a retry storm even when individual
                    # per-request limits appear modest.
                    retry_budget:
                      budget_percent:
                        value: 20.0
                      # Minimum concurrent retries allowed even when traffic is low.
                      # Prevents the budget from rounding down to zero on a quiet cluster.
                      min_retry_concurrency: 1
          http_filters:
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
  - name: backend
    # STRICT_DNS re-resolves the hostname on each DNS TTL expiry.
    # In Docker on Mac/Linux, host.docker.internal resolves to the host machine's
    # IP, allowing traffic from the container to reach a process on the host.
    type: STRICT_DNS
    connect_timeout: 1s
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: backend
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: host.docker.internal
                port_value: 8080

    # Circuit breaker thresholds (DEFAULT priority covers normal traffic).
    # These are intentionally low for the lab so you can observe overflow
    # at realistic concurrency levels using hey or parallel curl.
    #
    # Stat to watch: cluster.backend.upstream_rq_pending_overflow
    # Response flag in access log: UO (upstream overflow)
    circuit_breakers:
      thresholds:
      - priority: DEFAULT
        # max_connections: active TCP connections to all endpoints in the cluster.
        # Requests that arrive when cx_active == max_connections are queued.
        max_connections: 3
        # max_pending_requests: requests queued waiting for a connection.
        # Requests that arrive when pending_active == max_pending_requests are
        # immediately rejected with 503 and the UO response flag.
        max_pending_requests: 1
        # max_requests: total in-flight HTTP/2 requests (streams). For HTTP/1.1
        # this is effectively the same as max_connections.
        max_requests: 3
        # max_retries: concurrent retry attempts across the cluster.
        # Retries beyond this limit are suppressed and counted in
        # upstream_rq_retry_overflow.
        max_retries: 1
        # track_remaining: exposes circuit_breakers.default.remaining_* gauge stats
        # so you can alert before the breaker trips (e.g., remaining_cx < 2).
        track_remaining: true

    # Outlier detection ejects individual unhealthy hosts from the load balancer.
    # This is separate from circuit breaking: circuit breaking applies aggregate
    # limits to the whole cluster; outlier detection removes individual bad pods.
    #
    # Stats: cluster.backend.outlier_detection.ejections_enforced_consecutive_5xx
    #        cluster.backend.outlier_detection.ejections_active
    outlier_detection:
      # Eject a host after this many consecutive 5xx responses.
      consecutive_5xx: 3
      # Eject after this many consecutive gateway failures (connect timeout, reset).
      consecutive_gateway_failure: 3
      # Interval at which hosts are analyzed for ejection eligibility.
      interval: 10s
      # Minimum time an ejected host stays out of rotation.
      # Doubles on each successive ejection up to max_ejection_percent.
      base_ejection_time: 30s
      # Maximum percentage of hosts that can be ejected simultaneously.
      # Prevents outlier detection from removing all hosts during a correlated failure.
      max_ejection_percent: 50
